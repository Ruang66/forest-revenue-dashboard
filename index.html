<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Energy — Revenue Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

  :root {
    --primary: #114d5d;
    --primary-light: #46717e;
    --grey-blue: #8ca6ae;
    --light-bg: #dde4e6;
    --dark-bg: #0d2830;
    --green: #26f0a3;
    --orange: #ffb977;
    --white: #ffffff;
    --danger: #e05c5c;
    --confirmed: #26f0a3;
    --pipeline: #ffb977;
    --card-shadow: 0 2px 8px rgba(17,77,93,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', Arial, sans-serif; background: #f0f4f5; color: #1a1a1a; font-size: 14px; }

  /* ── HEADER ── */
  .header {
    background: var(--dark-bg);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .header-logo svg { width: 32px; height: 32px; }
  .header-logo img { height: 46px; display: block; }
  .header-logo .divider { width: 1px; height: 26px; background: var(--grey-blue); opacity: 0.4; }
  .header-title { color: var(--white); font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
  .header-subtitle { color: var(--grey-blue); font-size: 12px; margin-top: 1px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* ── FY TABS ── */
  .fy-bar {
    background: var(--primary);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 44px;
    overflow-x: auto;
  }
  .fy-tab {
    padding: 6px 18px;
    border-radius: 4px 4px 0 0;
    color: rgba(255,255,255,0.65);
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    border: none;
    background: transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .fy-tab:hover { color: white; background: rgba(255,255,255,0.1); }
  .fy-tab.active { color: white; background: var(--dark-bg); }
  .fy-tab-add {
    padding: 4px 12px;
    border-radius: 4px;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    cursor: pointer;
    border: none;
    background: transparent;
    margin-left: 4px;
    line-height: 1;
    transition: all 0.15s;
  }
  .fy-tab-add:hover { color: var(--green); background: rgba(255,255,255,0.1); }

  /* ── MAIN LAYOUT ── */
  .main { padding: 20px 28px; width: 100%; }

  /* ── KPI CARDS ── */
  .kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 20px; }
  .kpi-card {
    background: white;
    border-radius: 8px;
    padding: 16px 18px;
    box-shadow: var(--card-shadow);
    border-left: 4px solid var(--primary);
    position: relative;
  }
  .kpi-card.green { border-left-color: #26f0a3; }
  .kpi-card.orange { border-left-color: var(--orange); }
  .kpi-card.teal { border-left-color: var(--primary-light); }
  .kpi-label { font-size: 11px; color: var(--grey-blue); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 700; color: var(--primary); line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--grey-blue); margin-top: 4px; }

  /* ── CHARTS ROW ── */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .chart-card {
    background: white;
    border-radius: 8px;
    padding: 18px 20px;
    box-shadow: var(--card-shadow);
  }
  .chart-card.wide { grid-column: span 1; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 14px; }
  .chart-wrap { position: relative; }

  .charts-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { font-size: 15px; font-weight: 600; color: var(--primary); }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filter-bar select, .filter-bar input {
    padding: 6px 10px; border: 1px solid var(--light-bg); border-radius: 5px;
    font-size: 13px; color: #333; background: white; outline: none;
    font-family: inherit;
  }
  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--primary); }

  /* ── TABS ── */
  .tab-row { display: flex; gap: 0; border-bottom: 2px solid var(--light-bg); margin-bottom: 14px; }
  .tab-btn {
    padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; background: none; color: var(--grey-blue);
    border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-btn:hover:not(.active) { color: var(--primary-light); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; border-radius: 8px; box-shadow: var(--card-shadow); }
  table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
  thead th {
    background: var(--primary); color: white; padding: 10px 12px;
    text-align: left; font-weight: 500; white-space: nowrap; font-size: 12px;
  }
  thead th:first-child { border-radius: 8px 0 0 0; }
  thead th:last-child { border-radius: 0 8px 0 0; }
  tbody tr { border-bottom: 1px solid #f0f4f5; transition: background 0.1s; }
  tbody tr:hover { background: #f7fafb; }
  tbody td { padding: 9px 12px; vertical-align: middle; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
  }
  .badge-confirmed { background: rgba(38,240,163,0.15); color: #0a7a52; }
  .badge-pipeline { background: rgba(255,185,119,0.2); color: #b06a00; }
  .badge-location { background: var(--light-bg); color: var(--primary); }
  .np-positive { color: #0a7a52; font-weight: 600; }
  .np-negative { color: var(--danger); font-weight: 600; }
  .variance-over { color: #0a7a52; }
  .variance-under { color: var(--danger); }

  /* ── BUTTONS ── */
  .btn {
    padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; font-family: inherit; transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #0d3d4a; }
  .btn-green { background: var(--green); color: var(--dark-bg); }
  .btn-green:hover { background: #1dd48e; }
  .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outline:hover { background: var(--light-bg); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #c44; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { padding: 4px 8px; font-size: 14px; background: none; color: var(--grey-blue); border: none; cursor: pointer; border-radius: 4px; }
  .btn-icon:hover { background: var(--light-bg); color: var(--primary); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(13,40,48,0.6);
    z-index: 200; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 10px; padding: 28px; width: 600px;
    max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--light-bg); }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: span 2; }
  label { font-size: 12px; font-weight: 500; color: var(--primary-light); }
  input[type=text], input[type=number], select, textarea {
    padding: 8px 10px; border: 1px solid var(--light-bg); border-radius: 5px;
    font-size: 13px; font-family: inherit; outline: none; transition: border 0.15s;
    color: #1a1a1a;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); }
  .section-divider { grid-column: span 2; border: none; border-top: 1px solid var(--light-bg); margin: 4px 0; }
  .section-label { grid-column: span 2; font-size: 12px; font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

  /* ── MONTHLY GRID ── */
  .monthly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .monthly-grid input { font-size: 12px; padding: 6px 8px; }
  .month-label { font-size: 11px; color: var(--grey-blue); margin-bottom: 2px; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 40px; color: var(--grey-blue); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* ── TOOLTIP ── */
  [title] { cursor: help; }

  /* ── FY HEADER ── */
  .fy-info-bar {
    display: flex; align-items: center; gap: 16px;
    background: white; border-radius: 8px; padding: 12px 18px;
    box-shadow: var(--card-shadow); margin-bottom: 20px;
    border-left: 4px solid var(--primary);
  }
  .fy-info-year { font-size: 20px; font-weight: 700; color: var(--primary); }
  .fy-info-period { font-size: 13px; color: var(--grey-blue); }
  .fy-info-actions { margin-left: auto; display: flex; gap: 8px; }

  /* ── DELETE FY ── */
  .delete-fy-btn { color: var(--danger); font-size: 12px; cursor: pointer; background: none; border: none; padding: 4px 8px; border-radius: 4px; }
  .delete-fy-btn:hover { background: rgba(224,92,92,0.1); }

  @media (max-width: 1200px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .charts-row { grid-template-columns: 1fr 1fr; }
    .charts-row .chart-card:first-child { grid-column: span 2; }
  }
  @media (max-width: 768px) {
    .main { padding: 14px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .charts-row, .charts-row2 { grid-template-columns: 1fr; }
    .charts-row .chart-card:first-child { grid-column: span 1; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: span 1; }
    .section-divider, .section-label { grid-column: span 1; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <img src="/logo.svg" alt="Forest Energy">
    <div class="divider"></div>
    <div class="header-subtitle">Revenue Dashboard</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="exportData()">Export JSON</button>
    <button class="btn btn-green btn-sm" onclick="openAddProject()">+ Add Project</button>
    <button class="btn btn-outline btn-sm" onclick="window.location.href='/logout'">Sign Out</button>
  </div>
</div>

<!-- FY TABS -->
<div class="fy-bar" id="fyBar"></div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<!-- ADD/EDIT PROJECT MODAL -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Project</div>
    <div class="form-grid" id="projectForm">
      <div class="section-label">Project Info</div>

      <div class="form-group full">
        <label>Project Name *</label>
        <input type="text" id="f_name" placeholder="e.g. Advetech Phase 2">
      </div>
      <div class="form-group">
        <label>Project Number</label>
        <input type="text" id="f_proj_num" placeholder="e.g. 27010">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f_status">
          <option value="pipeline">Pipeline</option>
          <option value="confirmed">Confirmed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Project Value (ZAR excl. VAT) *</label>
        <input type="number" id="f_proj_value" placeholder="0" min="0" step="1000">
      </div>
      <div class="form-group">
        <label>Quarter Closed</label>
        <select id="f_quarter">
          <option value="Q1 (March, April, May)">Q1 (March, April, May)</option>
          <option value="Q2 (June, July, Aug)">Q2 (June, July, Aug)</option>
          <option value="Q3 (Sept, Oct, Nov)">Q3 (Sept, Oct, Nov)</option>
          <option value="Q4 (Dec, Jan, Feb)">Q4 (Dec, Jan, Feb)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="f_location" placeholder="e.g. Cape Town">
      </div>
      <div class="form-group">
        <label>Lead Source</label>
        <select id="f_lead_source">
          <option value="">-- Select --</option>
          <option value="Existing Client">Existing Client</option>
          <option value="Direct Lead">Direct Lead</option>
          <option value="Channel Partner">Channel Partner</option>
          <option value="Consulting Engineer/Tender">Consulting Engineer/Tender</option>
          <option value="Tender">Tender</option>
          <option value="IPP">IPP</option>
          <option value="IGEN">IGEN</option>
          <option value="Referral">Referral</option>
        </select>
      </div>
      <div class="form-group">
        <label>PV Size (kWp)</label>
        <input type="number" id="f_pv_kw" placeholder="0" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label>BESS Size (kWh)</label>
        <input type="number" id="f_bess_kwh" placeholder="0" min="0" step="0.1">
      </div>
      <div class="form-group" id="winProbGroup">
        <label>Win Probability (%)</label>
        <input type="number" id="f_win_prob" placeholder="50" min="0" max="100">
      </div>

      <hr class="section-divider">
      <div class="section-label">Financials (Confirmed Projects)</div>

      <div class="form-group">
        <label>Costed NP (ZAR)</label>
        <input type="number" id="f_costed_np" placeholder="0">
      </div>
      <div class="form-group">
        <label>Actual NP (ZAR)</label>
        <input type="number" id="f_actual_np" placeholder="0">
      </div>
      <div class="form-group">
        <label>PM and Engineering Cost (ZAR)</label>
        <input type="number" id="f_pm_eng" placeholder="0">
      </div>
      <div class="form-group">
        <label>Commissioning Cost (ZAR)</label>
        <input type="number" id="f_commissioning" placeholder="0">
      </div>

      <hr class="section-divider">
      <div class="section-label">Revenue Recognition by Month</div>
      <div class="form-group full">
        <div class="monthly-grid" id="monthlyInputs"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('projectModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<!-- ADD FY MODAL -->
<div class="modal-overlay" id="fyModal">
  <div class="modal" style="width:380px">
    <div class="modal-title">Add Financial Year</div>
    <div class="form-group">
      <label>Financial Year Label</label>
      <input type="text" id="f_fy_name" placeholder="e.g. FY28">
    </div>
    <div class="form-group" style="margin-top:12px">
      <label>Period</label>
      <input type="text" id="f_fy_period" placeholder="e.g. March 2027 - Feb 2028">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('fyModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveFY()">Add Year</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="width:360px">
    <div class="modal-title" style="color:var(--danger)">Delete Project?</div>
    <p style="color:#555;font-size:14px;margin-bottom:6px">This cannot be undone.</p>
    <p style="font-weight:600;color:#333" id="deleteProjectName"></p>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

async function loadDB() {
  try {
    const res = await fetch('/api/data', { credentials: 'same-origin' });
    if (res.status === 401) { window.location.href = '/login'; return; }
    const stored = await res.json();
    if (stored && Object.keys(stored).length) {
      db = stored;
      // Inject any seed years not yet in the stored db
      let changed = false;
      Object.keys(SEED).forEach(fy => {
        if (!db[fy]) { db[fy] = JSON.parse(JSON.stringify(SEED[fy])); changed = true; }
      });
      if (changed) await saveDB();
      return;
    }
  } catch(e) { console.error('Load failed', e); }
  // Empty database (first run) — seed it
  db = JSON.parse(JSON.stringify(SEED));
  await saveDB();
}
async function saveDB() {
  try {
    const res = await fetch('/api/data', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(db)
    });
    if (res.status === 401) { window.location.href = '/login'; }
  } catch(e) { console.error('Save failed', e); }
}
function genId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ─────────────────────────────────────────
//  FORMAT HELPERS
// ─────────────────────────────────────────
function fmt(n, decimals=0) {
  if (n == null || isNaN(n)) return '—';
  return 'R ' + Number(n).toLocaleString('en-ZA', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}
function fmtM(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1e6) return 'R ' + (n/1e6).toFixed(2) + 'M';
  if (Math.abs(n) >= 1e3) return 'R ' + (n/1e3).toFixed(0) + 'k';
  return 'R ' + n.toFixed(0);
}
function fmtPct(n) { return n == null || isNaN(n) ? '—' : n.toFixed(1) + '%'; }

// ─────────────────────────────────────────
//  COMPUTED STATS
// ─────────────────────────────────────────
function stats(fy) {
  const projects = (db[fy] || {projects:[]}).projects;
  const confirmed = projects.filter(p => p.status === 'confirmed');
  const pipeline = projects.filter(p => p.status === 'pipeline');

  const confirmedRev = confirmed.reduce((s,p) => s + (p.total_income||p.proj_value||0), 0);
  const pipelineVal = pipeline.reduce((s,p) => s + (p.proj_value||0), 0);
  const weightedPipeline = pipeline.reduce((s,p) => s + (p.proj_value||0)*(p.win_prob||50)/100, 0);
  const totalPV = confirmed.reduce((s,p) => s + (p.pv_kw||0), 0);
  const totalBESS = confirmed.reduce((s,p) => s + (p.bess_kwh||0), 0);

  // NP budget vs actual
  const withNP = confirmed.filter(p => p.costed_np != null || p.actual_np != null);
  const totalCostedNP = withNP.reduce((s,p) => s + (p.costed_np||0), 0);
  const totalActualNP = withNP.reduce((s,p) => s + (p.actual_np||0), 0);
  const npVariance = totalActualNP - totalCostedNP;
  const avgCostedNPPct = confirmedRev > 0 ? (totalCostedNP / confirmedRev) * 100 : 0;
  const avgActualNPPct = confirmedRev > 0 ? (totalActualNP / confirmedRev) * 100 : 0;

  // Monthly revenue
  const monthly = {};
  MONTHS.forEach(m => monthly[m] = 0);
  confirmed.forEach(p => { if(p.monthly) MONTHS.forEach(m => { if(p.monthly[m]) monthly[m] += p.monthly[m]; }); });

  const totalPMEng = confirmed.reduce((s,p) => s + (p.pm_eng||0), 0);

  return { confirmed, pipeline, confirmedRev, pipelineVal, weightedPipeline, totalPV, totalBESS, monthly, all: projects,
           totalCostedNP, totalActualNP, npVariance, avgCostedNPPct, avgActualNPPct, totalPMEng };
}

        <div class="kpi-sub">Budgeted: ${fmtPct(s.avgCostedNPPct)}</div>
      </div>
    </div>

    <!-- CHARTS ROW 1: Monthly + compact overviews -->
    <div style="display:grid;grid-template-columns:3fr 1fr;gap:14px;margin-bottom:14px">
      <div class="chart-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="chart-title" style="margin-bottom:0">Monthly Revenue Recognition (Confirmed)</div>
          <div style="display:flex;gap:12px;font-size:11px;font-weight:500">
            <span style="color:#8ca6ae">Q1</span><span style="color:#46717e">Q2</span><span style="color:#114d5d">Q3</span><span style="color:#0d2830">Q4</span>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="chartMonthly" height="100"></canvas></div>
      </div>
      <div style="display:grid;grid-template-rows:1fr 1fr;gap:14px">
        <div class="chart-card" style="padding:14px 16px">
          <div class="chart-title" style="margin-bottom:10px">Lead Sources</div>
          <div id="leadMini"></div>
        </div>
        <div class="chart-card" style="padding:14px 16px">
          <div class="chart-title" style="margin-bottom:10px">Project Type Split</div>
          <div id="typeMini"></div>
        </div>
      </div>
    </div>

    <!-- QUARTER SUMMARY CARDS -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px" id="quarterSummary"></div>

    <!-- CHARTS ROW 2: NP Budget vs Actual (full width) -->
    <div class="chart-card" style="margin-bottom:14px">
      <div class="chart-title">Net Profit: Budgeted vs Actual — per Project (Confirmed)</div>
      <div class="chart-wrap"><canvas id="chartNP" height="70"></canvas></div>
    </div>

    <!-- CHARTS ROW 3: Quarter -->
    <div class="chart-card" style="margin-bottom:20px">
      <div class="chart-title">Revenue vs Pipeline by Quarter</div>
      <div class="chart-wrap"><canvas id="chartQuarter" height="60"></canvas></div>
    </div>

    <!-- PROJECT TABLES -->
    <div class="chart-card" style="margin-bottom:20px">
      <div class="section-header">
        <div class="section-title">Projects</div>
        <div style="display:flex;gap:10px;align-items:center">
          <input type="text" id="searchInput" placeholder="Search projects..." style="width:180px" oninput="filterProjects()">
          <select id="filterLead" onchange="filterProjects()" style="font-size:13px;padding:6px 10px;border:1px solid var(--light-bg);border-radius:5px">
            <option value="">All Lead Sources</option>
            ${[...new Set(s.all.map(p=>p.lead_source).filter(Boolean))].map(l=>`<option value="${l}">${l}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="tab-row">
        <button class="tab-btn ${activeTab==='confirmed'?'active':''}" onclick="switchTab('confirmed')">Confirmed (${s.confirmed.length})</button>
        <button class="tab-btn ${activeTab==='pipeline'?'active':''}" onclick="switchTab('pipeline')">Pipeline (${s.pipeline.length})</button>
        <button class="tab-btn ${activeTab==='all'?'active':''}" onclick="switchTab('all')">All (${s.all.length})</button>
      </div>
      <div id="projectTable"></div>
    </div>
  `;

  buildCharts(s);
  renderTable(s);
}

// ─────────────────────────────────────────
//  CHARTS
// ─────────────────────────────────────────
function buildCharts(s) {
  const pColor = '#114d5d';
  const gColor = '#26f0a3';
  const oColor = '#ffb977';
  const lColor = '#46717e';
  const greys = ['#114d5d','#46717e','#8ca6ae','#26f0a3','#ffb977','#16e7cf','#6ea1b1','#0d2830','#dde4e6','#488a9a'];

  // Quarter backgrounds: Q1=0-2, Q2=3-5, Q3=6-8, Q4=9-11
  const qBands = [
    {from:0,to:2,color:'rgba(140,166,174,0.10)',label:'Q1'},
    {from:3,to:5,color:'rgba(70,113,126,0.10)',label:'Q2'},
    {from:6,to:8,color:'rgba(17,77,93,0.10)',label:'Q3'},
    {from:9,to:11,color:'rgba(13,40,48,0.10)',label:'Q4'},
  ];
  const quarterBandPlugin = {
    id: 'quarterBands',
    beforeDraw(chart) {
      const {ctx, chartArea:{left,right,top,bottom}, scales:{x}} = chart;
      if (!x) return;
      qBands.forEach(({from,to,color,label}) => {
        const x0 = x.getPixelForValue(from) - x.width/(MONTHS.length*2);
        const x1 = x.getPixelForValue(to) + x.width/(MONTHS.length*2);
        ctx.save();
        ctx.fillStyle = color;
        ctx.fillRect(x0, top, x1-x0, bottom-top);
        ctx.fillStyle = 'rgba(70,113,126,0.4)';
        ctx.font = '11px Roboto,Arial,sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(label, (x0+x1)/2, top+12);
        ctx.restore();
      });
    }
  };

  // Monthly Revenue
  const qColors = ['#8ca6ae','#8ca6ae','#8ca6ae','#46717e','#46717e','#46717e','#114d5d','#114d5d','#114d5d','#0d2830','#0d2830','#0d2830'];
  charts.monthly = new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    plugins: [quarterBandPlugin],
    data: {
      labels: MONTHS,
      datasets: [{
        label: 'Revenue (ZAR)',
        data: MONTHS.map(m => s.monthly[m]),
        backgroundColor: MONTHS.map((m,i) => s.monthly[m] > 0 ? qColors[i] : 'rgba(0,0,0,0.04)'),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => fmtM(ctx.raw) } }
      },
      scales: {
        y: { ticks: { callback: v => fmtM(v), font:{size:11} }, grid: { color:'#f0f4f5' } },
        x: { ticks: { font:{size:11} }, grid: { display: false } }
      },
      layout: { padding: { top: 8 } }
    }
  });

  // Quarter summary cards
  const QUARTERS = [
    {key:'Q1 (March, April, May)', label:'Q1', months:['March','April','May'], color:'#8ca6ae'},
    {key:'Q2 (June, July, Aug)',   label:'Q2', months:['June','July','Aug'],   color:'#46717e'},
    {key:'Q3 (Sept, Oct, Nov)',    label:'Q3', months:['Sept','Oct','Nov'],    color:'#114d5d'},
    {key:'Q4 (Dec, Jan, Feb)',     label:'Q4', months:['Dec','Jan','Feb'],     color:'#0d2830'},
  ];
  const qSummaryEl = document.getElementById('quarterSummary');
  if (qSummaryEl) {
    qSummaryEl.innerHTML = QUARTERS.map(q => {
      const qConfirmed = s.confirmed.filter(p => p.quarter === q.key);
      const qPipeline  = s.pipeline.filter(p => p.quarter === q.key);
      const qRev   = q.months.reduce((a,m) => a + (s.monthly[m]||0), 0);
      const qPV    = qConfirmed.reduce((a,p) => a + (p.pv_kw||0), 0) + qPipeline.reduce((a,p) => a + (p.pv_kw||0), 0);
      const qBESS  = qConfirmed.reduce((a,p) => a + (p.bess_kwh||0), 0) + qPipeline.reduce((a,p) => a + (p.bess_kwh||0), 0);
      const qNP    = qConfirmed.reduce((a,p) => a + (p.actual_np||p.costed_np||0), 0);
      const qPMEng = qConfirmed.reduce((a,p) => a + (p.pm_eng||0), 0);
      const cCount = qConfirmed.length;
      const pCount = qPipeline.length;
      return `
        <div class="chart-card" style="border-left:4px solid ${q.color};padding:16px 18px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:15px;font-weight:700;color:${q.color}">${q.label}</div>
            <div style="font-size:11px;color:var(--grey-blue)">${q.months[0]} – ${q.months[2]}</div>
          </div>
          <div style="font-size:20px;font-weight:700;color:var(--primary);margin-bottom:2px">${fmtM(qRev)}</div>
          <div style="font-size:11px;color:var(--grey-blue);margin-bottom:10px">Revenue recognised${qNP > 0 ? ` · NP ${fmtM(qNP)}` : ''}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
            <div style="background:#f7fafb;border-radius:5px;padding:7px 10px">
              <div style="font-size:10px;color:var(--grey-blue);font-weight:500;text-transform:uppercase;letter-spacing:0.4px">PV (kWp)</div>
              <div style="font-size:15px;font-weight:700;color:var(--primary)">${qPV > 0 ? qPV.toLocaleString('en-ZA',{maximumFractionDigits:0}) : '—'}</div>
            </div>
            <div style="background:#f7fafb;border-radius:5px;padding:7px 10px">
              <div style="font-size:10px;color:var(--grey-blue);font-weight:500;text-transform:uppercase;letter-spacing:0.4px">BESS (kWh)</div>
              <div style="font-size:15px;font-weight:700;color:var(--primary)">${qBESS > 0 ? qBESS.toLocaleString('en-ZA',{maximumFractionDigits:0}) : '—'}</div>
            </div>
            <div style="background:#f0faf6;border-radius:5px;padding:7px 10px;border:1px solid rgba(22,231,207,0.2)">
              <div style="font-size:10px;color:var(--grey-blue);font-weight:500;text-transform:uppercase;letter-spacing:0.4px">PM+Eng</div>
              <div style="font-size:15px;font-weight:700;color:var(--primary)">${qPMEng > 0 ? fmtM(qPMEng) : '—'}</div>
            </div>
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--grey-blue)">${cCount} confirmed${pCount > 0 ? ` · ${pCount} pipeline` : ''}</div>
        </div>`;
    }).join('');
  }

  // Lead Source mini list — confirmed only
  const leadMap = {};
  s.confirmed.forEach(p => { const l = p.lead_source||'Unknown'; leadMap[l] = (leadMap[l]||0) + 1; });
  const leadTotal = s.confirmed.length;
  const leadEl = document.getElementById('leadMini');
  if (leadEl) {
    const sorted = Object.entries(leadMap).sort((a,b)=>b[1]-a[1]);
    leadEl.innerHTML = sorted.map(([l,cnt]) => {
      const pct = Math.round(cnt/leadTotal*100);
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <div style="flex:1;font-size:12px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l}</div>
        <div style="width:80px;height:6px;background:#f0f4f5;border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:var(--primary);border-radius:3px"></div>
        </div>
        <div style="font-size:11px;color:var(--grey-blue);width:28px;text-align:right">${cnt}</div>
      </div>`;
    }).join('');
  }

  // Type split mini — confirmed only
  const pvOnly = s.confirmed.filter(p=>p.pv_kw>0&&!p.bess_kwh).length;
  const bessOnly = s.confirmed.filter(p=>!p.pv_kw&&p.bess_kwh>0).length;
  const hybrid = s.confirmed.filter(p=>p.pv_kw>0&&p.bess_kwh>0).length;
  const typeEl = document.getElementById('typeMini');
  if (typeEl) {
    const types = [['Solar Only', pvOnly, pColor],['BESS Only', bessOnly, oColor],['Hybrid', hybrid, gColor]];
    typeEl.innerHTML = types.map(([label, cnt, color]) => {
      const pct = s.confirmed.length > 0 ? Math.round(cnt/s.confirmed.length*100) : 0;
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <div style="width:10px;height:10px;border-radius:2px;background:${color};flex-shrink:0"></div>
        <div style="flex:1;font-size:12px;color:#444">${label}</div>
        <div style="width:60px;height:6px;background:#f0f4f5;border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div>
        </div>
        <div style="font-size:11px;color:var(--grey-blue);width:28px;text-align:right">${cnt}</div>
      </div>`;
    }).join('');
  }

  // NP Budgeted vs Actual — full width per project
  const npProjects = s.confirmed.filter(p => p.costed_np != null || p.actual_np != null);
  charts.np = new Chart(document.getElementById('chartNP'), {
    type: 'bar',
    data: {
      labels: npProjects.map(p => p.name.length > 16 ? p.name.slice(0,14)+'…' : p.name),
      datasets: [
        { label: 'Budgeted NP', data: npProjects.map(p=>p.costed_np||0), backgroundColor: lColor, borderRadius: 3, barPercentage: 0.7 },
        { label: 'Actual NP', data: npProjects.map(p=>p.actual_np||0),
          backgroundColor: npProjects.map(p => (p.actual_np||0) >= (p.costed_np||0) ? gColor : '#e05c5c'),
          borderRadius: 3, barPercentage: 0.7 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top', labels:{font:{size:12},boxWidth:14,padding:16} },
        tooltip: { callbacks: {
          label: ctx => `${ctx.dataset.label}: ${fmtM(ctx.raw)}`,
          afterBody: (items) => {
            const p = npProjects[items[0].dataIndex];
            const diff = (p.actual_np||0) - (p.costed_np||0);
            return [`Variance: ${diff >= 0 ? '+' : ''}${fmtM(diff)}`];
          }
        }}
      },
      scales: {
        y: { ticks: { callback: v => fmtM(v), font:{size:11} }, grid:{color:'#f0f4f5'} },
        x: { ticks: { font:{size:11} }, grid:{display:false} }
      }
    }
  });

  // Revenue vs Pipeline by Quarter
  const quarters = ['Q1 (March, April, May)','Q2 (June, July, Aug)','Q3 (Sept, Oct, Nov)','Q4 (Dec, Jan, Feb)'];
  const qLabels = ['Q1','Q2','Q3','Q4'];
  const qConfirmed = quarters.map(q => s.confirmed.filter(p=>p.quarter===q).reduce((a,p)=>a+(p.total_income||p.proj_value||0),0));
  const qPipeline = quarters.map(q => s.pipeline.filter(p=>p.quarter===q).reduce((a,p)=>a+(p.proj_value||0),0));
  charts.quarter = new Chart(document.getElementById('chartQuarter'), {
    type: 'bar',
    data: {
      labels: qLabels,
      datasets: [
        { label: 'Confirmed Revenue', data: qConfirmed, backgroundColor: pColor, borderRadius: 4 },
        { label: 'Pipeline Value', data: qPipeline, backgroundColor: oColor, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top', labels:{font:{size:11},boxWidth:12} },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtM(ctx.raw)}` } }
      },
      scales: {
        y: { ticks: { callback: v => fmtM(v), font:{size:11} }, grid:{color:'#f0f4f5'} },
        x: { ticks: { font:{size:11} }, grid:{display:false} }
      }
    }
  });
}

function switchTab(tab) { activeTab = tab; const s = stats(activeFY); renderTable(s); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.startsWith(tab.charAt(0).toUpperCase()+tab.slice(1)))); }

function filterProjects() { renderTable(stats(activeFY)); }

function confirmedTableHTML(list) {
  if (!list.length) return '';
  return `
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Project</th><th>Proj #</th><th>Quarter</th><th>Location</th><th>Lead Source</th>
        <th>PV kWp</th><th>BESS kWh</th><th>Contract Value</th><th>Budgeted NP</th><th>Actual NP</th><th>Variance</th><th>NP %</th><th>PM+Eng</th><th></th>
      </tr></thead>
      <tbody>
      ${list.map(p => {
        const variance = p.under_over;
        const npPct = p.actual_np_pct || p.costed_np_margin;
        return `<tr>
          <td><strong>${p.name}</strong></td>
          <td style="color:var(--grey-blue)">${p.proj_num||'—'}</td>
          <td>${p.quarter.split(' ')[0]}</td>
          <td>${p.location ? `<span class="badge badge-location">${p.location}</span>` : '—'}</td>
          <td style="font-size:12px">${p.lead_source||'—'}</td>
          <td>${p.pv_kw ? p.pv_kw.toLocaleString('en-ZA') : '—'}</td>
          <td>${p.bess_kwh ? p.bess_kwh.toLocaleString('en-ZA') : '—'}</td>
          <td>${fmtM(p.proj_value)}</td>
          <td>${fmtM(p.costed_np)}</td>
          <td class="${(p.actual_np||0) >= (p.costed_np||0) ? 'np-positive' : 'np-negative'}">${fmtM(p.actual_np)}</td>
          <td class="${variance >= 0 ? 'variance-over' : 'variance-under'}">${variance != null ? (variance >= 0 ? '+' : '') + fmtM(variance) : '—'}</td>
          <td class="${(npPct||0) >= 15 ? 'np-positive' : ''}">${fmtPct(npPct)}</td>
          <td>${fmtM(p.pm_eng)}</td>
          <td style="white-space:nowrap">
            <button class="btn-icon" title="Edit" onclick="editProject('${p.id}')">✏️</button>
            <button class="btn-icon" title="Delete" onclick="openDelete('${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑️</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  </div>`;
}

function pipelineTableHTML(list) {
  if (!list.length) return '';
  return `
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Pipeline Project</th><th>Quarter</th><th>Location</th><th>Lead Source</th>
        <th>PV kWp</th><th>BESS kWh</th><th>Est. Value</th><th>Win Prob</th><th>Weighted Value</th><th></th>
      </tr></thead>
      <tbody>
      ${list.map(p => `<tr>
        <td><strong>${p.name}</strong></td>
        <td>${p.quarter.split(' ')[0]}</td>
        <td>${p.location ? `<span class="badge badge-location">${p.location}</span>` : '—'}</td>
        <td style="font-size:12px">${p.lead_source||'—'}</td>
        <td>${p.pv_kw ? p.pv_kw.toLocaleString('en-ZA') : '—'}</td>
        <td>${p.bess_kwh ? p.bess_kwh.toLocaleString('en-ZA') : '—'}</td>
        <td>${fmtM(p.proj_value)}</td>
        <td>${p.win_prob != null ? p.win_prob+'%' : '—'}</td>
        <td>${fmtM((p.proj_value||0)*(p.win_prob||50)/100)}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-green btn-sm" title="Convert to confirmed deal" onclick="convertToDeal('${p.id}')" style="padding:4px 9px;margin-right:4px">✓ Convert to Deal</button>
          <button class="btn-icon" title="Edit" onclick="editProject('${p.id}')">✏️</button>
          <button class="btn-icon" title="Delete" onclick="openDelete('${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑️</button>
        </td>
      </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderTable(s) {
  const search = (document.getElementById('searchInput')||{value:''}).value.toLowerCase();
  const leadFilter = (document.getElementById('filterLead')||{value:''}).value;

  const applyFilters = list => {
    let r = list;
    if (search) r = r.filter(p => p.name.toLowerCase().includes(search) || (p.proj_num||'').toLowerCase().includes(search));
    if (leadFilter) r = r.filter(p => p.lead_source === leadFilter);
    return r;
  };

  const wrap = document.getElementById('projectTable');
  if (!wrap) return;

  let html = '';

  if (activeTab === 'confirmed') {
    const list = applyFilters(s.confirmed);
    html = list.length ? confirmedTableHTML(list) : `<div class="empty"><div class="empty-icon">📋</div><div>No confirmed projects</div></div>`;
  } else if (activeTab === 'pipeline') {
    const list = applyFilters(s.pipeline);
    html = list.length ? pipelineTableHTML(list) : `<div class="empty"><div class="empty-icon">📋</div><div>No pipeline projects</div></div>`;
  } else {
    // All tab — show confirmed then pipeline
    const cList = applyFilters(s.confirmed);
    const pList = applyFilters(s.pipeline);
    if (!cList.length && !pList.length) {
      html = `<div class="empty"><div class="empty-icon">📋</div><div>No projects found</div></div>`;
    } else {
      if (cList.length) html += `<div style="margin-bottom:${pList.length?'16px':'0'}">${confirmedTableHTML(cList)}</div>`;
      if (pList.length) html += pipelineTableHTML(pList);
    }
  }

  wrap.innerHTML = html;
}

// ─────────────────────────────────────────
//  ADD / EDIT PROJECT
// ─────────────────────────────────────────
function buildMonthlyInputs(values) {
  return MONTHS.map(m => `
    <div>
      <div class="month-label">${m}</div>
      <input type="number" id="fm_${m}" placeholder="0" min="0" step="1000" value="${values && values[m] ? values[m] : ''}">
    </div>
  `).join('');
}

function openAddProject() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Project — ' + activeFY;
  clearForm();
  document.getElementById('monthlyInputs').innerHTML = buildMonthlyInputs({});
  openModal('projectModal');
}

function editProject(id) {
  const p = db[activeFY].projects.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Project';
  document.getElementById('f_name').value = p.name || '';
  document.getElementById('f_proj_num').value = p.proj_num || '';
  document.getElementById('f_status').value = p.status || 'pipeline';
  document.getElementById('f_proj_value').value = p.proj_value || '';
  document.getElementById('f_quarter').value = p.quarter || 'Q1 (March, April, May)';
  document.getElementById('f_location').value = p.location || '';
  document.getElementById('f_lead_source').value = p.lead_source || '';
  document.getElementById('f_pv_kw').value = p.pv_kw || '';
  document.getElementById('f_bess_kwh').value = p.bess_kwh || '';
  document.getElementById('f_win_prob').value = p.win_prob || '';
  document.getElementById('f_costed_np').value = p.costed_np || '';
  document.getElementById('f_actual_np').value = p.actual_np || '';
  document.getElementById('f_pm_eng').value = p.pm_eng || '';
  document.getElementById('f_commissioning').value = p.commissioning_cost || '';
  document.getElementById('monthlyInputs').innerHTML = buildMonthlyInputs(p.monthly || {});
  openModal('projectModal');
}

function convertToDeal(id) {
  const p = db[activeFY].projects.find(x => x.id === id);
  if (!p) return;
  editProject(id);                                                   // load all fields into the modal
  document.getElementById('modalTitle').textContent = 'Convert to Deal — ' + p.name;
  document.getElementById('f_status').value = 'confirmed';           // flip pipeline → confirmed
  document.getElementById('f_win_prob').value = '';                  // win probability no longer applies
}

function clearForm() {
  ['f_name','f_proj_num','f_proj_value','f_location','f_win_prob','f_costed_np','f_actual_np','f_pm_eng','f_commissioning'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('f_status').value = 'pipeline';
  document.getElementById('f_quarter').value = 'Q1 (March, April, May)';
  document.getElementById('f_lead_source').value = '';
  document.getElementById('f_pv_kw').value = '';
  document.getElementById('f_bess_kwh').value = '';
}

function saveProject() {
  const name = document.getElementById('f_name').value.trim();
  const proj_value = parseFloat(document.getElementById('f_proj_value').value);
  if (!name) { alert('Project name is required.'); return; }
  if (!proj_value || proj_value <= 0) { alert('Project value is required.'); return; }

  const monthly = {};
  MONTHS.forEach(m => {
    const v = parseFloat(document.getElementById('fm_'+m)?.value);
    if (v > 0) monthly[m] = v;
  });

  const actual_np = parseFloat(document.getElementById('f_actual_np').value) || null;
  const costed_np = parseFloat(document.getElementById('f_costed_np').value) || null;
  const status = document.getElementById('f_status').value;
  const total_income = Object.values(monthly).reduce((a,b)=>a+b,0) || (status==='confirmed' ? proj_value : 0);
  const actual_np_pct = actual_np && total_income ? parseFloat(((actual_np/total_income)*100).toFixed(2)) : null;
  const costed_np_margin = costed_np && proj_value ? parseFloat(((costed_np/proj_value)*100).toFixed(2)) : null;
  const under_over = (actual_np != null && costed_np != null) ? actual_np - costed_np : null;

  const project = {
    id: editingId || genId(),
    name,
    proj_num: document.getElementById('f_proj_num').value.trim(),
    proj_value,
    status,
    quarter: document.getElementById('f_quarter').value,
    location: document.getElementById('f_location').value.trim(),
    lead_source: document.getElementById('f_lead_source').value,
    pv_kw: parseFloat(document.getElementById('f_pv_kw').value) || 0,
    bess_kwh: parseFloat(document.getElementById('f_bess_kwh').value) || 0,
    win_prob: parseFloat(document.getElementById('f_win_prob').value) || null,
    monthly,
    total_income,
    actual_np,
    actual_np_pct,
    costed_np,
    costed_np_margin,
    under_over,
    pm_eng: parseFloat(document.getElementById('f_pm_eng').value) || null,
    commissioning_cost: parseFloat(document.getElementById('f_commissioning').value) || null,
  };

  if (!db[activeFY]) db[activeFY] = { label: activeFY, period: '', projects: [] };
  if (editingId) {
    const idx = db[activeFY].projects.findIndex(p => p.id === editingId);
    if (idx >= 0) db[activeFY].projects[idx] = project;
  } else {
    db[activeFY].projects.push(project);
  }

  saveDB();
  closeModal('projectModal');
  renderAll();
}

// ─────────────────────────────────────────
//  DELETE
// ─────────────────────────────────────────
function openDelete(id, name) {
  deleteId = id;
  document.getElementById('deleteProjectName').textContent = name;
  openModal('deleteModal');
}
function confirmDelete() {
  if (!deleteId) return;
  db[activeFY].projects = db[activeFY].projects.filter(p => p.id !== deleteId);
  deleteId = null;
  saveDB(); closeModal('deleteModal'); renderAll();
}

// ─────────────────────────────────────────
//  FY MANAGEMENT
// ─────────────────────────────────────────
function openAddFY() { document.getElementById('f_fy_name').value = ''; document.getElementById('f_fy_period').value = ''; openModal('fyModal'); }
function saveFY() {
  const name = document.getElementById('f_fy_name').value.trim().toUpperCase();
  const period = document.getElementById('f_fy_period').value.trim();
  if (!name) { alert('FY label is required (e.g. FY28)'); return; }
  if (db[name]) { alert(`${name} already exists.`); return; }
  db[name] = { label: name, period, projects: [] };
  activeFY = name;
  saveDB(); closeModal('fyModal'); renderAll();
}
function deleteFY(fy) {
  if (!confirm(`Delete ${fy} and all its projects? This cannot be undone.`)) return;
  delete db[fy];
  activeFY = Object.keys(db)[0] || 'FY27';
  saveDB(); renderAll();
}

// ─────────────────────────────────────────
//  MODAL HELPERS
// ─────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ─────────────────────────────────────────
//  EXPORT
// ─────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'FE_Dashboard_Data.json'; a.click();
  URL.revokeObjectURL(url);
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
loadDB().then(() => {
  if (!db[activeFY]) activeFY = Object.keys(db)[0] || activeFY;   // fall back if FY27 was removed
  renderAll();
});
</script>
</body>
</html>
